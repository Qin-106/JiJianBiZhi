<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>极简壁纸</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #121212;
      color: #fff;
      font-family: sans-serif;
      padding-bottom: 70px;
    }
    .top-bar {
      position: sticky;
      top: 0;
      background: #1f1f1f;
      padding: 12px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
      z-index: 10;
    }
    .top-bar input {
      margin-top: 8px;
      width: 90%;
      padding: 8px 12px;
      border-radius: 20px;
      border: none;
      outline: none;
      font-size: 14px;
      background: #333;
      color: #fff;
    }
    .page {
      display: none;
      padding: 10px;
    }
    .page.active {
      display: block;
    }
    .nav-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 60px;
      background: #1f1f1f;
      display: flex;
      justify-content: space-around;
      align-items: center;
    }
    .nav-item, .class-item {
      background: none;
      border: none;
      font-family: sans-serif;
      cursor: pointer;
      color: #999;
      font-size: 16px;
      padding:16px;
    }
    .nav-item.active {
      color: #fff;
      font-weight: bold;
    }
    .wall-list {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 10px;
    }
    .wall-item {
      background: #222;
      border-radius: 12px;
      overflow: hidden;
      aspect-ratio: 9/16;
    }
    .wall-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .class-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 20px;
    }
    .loading {
      text-align: center;
      padding: 20px;
      color: #aaa;
    }
    .preview-box {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.98);
      display: none;
      z-index: 999;
      justify-content: center;
      align-items: center;
    }
    .preview-box img {
      width: 90%;
      max-width: 600px;
      border-radius: 12px;
    }
    .btn-box {
      text-align: center;
      margin-top: 30px;
    }
    .btn {
      padding: 10px 25px;
      background: #2979ff;
      border: none;
      color: #fff;
      border-radius: 6px;
      margin: 0 8px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="top-bar">
    <div id="topTitle">极简壁纸</div>
    <input id="searchInput" placeholder="搜索分类或关键词" />
  </div>

  <div id="homePage" class="page active">
    <div class="wall-list" id="wallList"></div>
    <div class="loading" id="loading">加载中...</div>
  </div>

  <div id="catePage" class="page">
    <div class="class-list">
      <button class="class-item" data-type="fengjing">🌄 风景壁纸</button>
      <button class="class-item" data-type="qiche">🚗 汽车机车壁纸</button>
      <button class="class-item" data-type="dongman">🎨 二次元动漫壁纸</button>
      <button class="class-item" data-type="renxiang">👩 美女人像壁纸</button>
      <button class="class-item" data-type="meishi">🍔 美食静物壁纸</button>
      <button class="class-item" data-type="yingshi">🎬 影视大片壁纸</button>
      <button class="class-item" data-type="gufeng">🏮 古风国风壁纸</button>
      <button class="class-item" data-type="youxi">🎮 游戏电竞壁纸</button>
    </div>
  </div>

  <div class="nav-bar">
    <button class="nav-item active" onclick="showPage('home')">首页</button>
    <button class="nav-item" onclick="showPage('cate')">分类</button>
  </div>

  <div class="preview-box" id="previewBox">
    <img id="previewImg" />
    <div class="btn-box">
      <button class="btn" onclick="saveImg()">保存图片</button>
      <button class="btn" onclick="closePre()">关闭</button>
    </div>
  </div>

<script>
let currentType = "suiji";
let oldImgArr = [];
let lock = false;

let wallList, previewBox, previewImg, topTitle, loading;

document.addEventListener("DOMContentLoaded", function(){
    wallList = document.getElementById("wallList");
    previewBox = document.getElementById("previewBox");
    previewImg = document.getElementById("previewImg");
    topTitle = document.getElementById("topTitle");
    loading = document.getElementById("loading");

    // 分类点击绑定
    document.querySelectorAll(".class-item").forEach(btn=>{
        btn.onclick = function(){
            currentType = this.dataset.type;
            topTitle.innerText = this.innerText;
            oldImgArr = [];
            wallList.innerHTML = "";
            showPage("home");
            loadMore();
        }
    })

    loadMore();
})

// 页面切换
function showPage(page){
    document.querySelectorAll(".page").forEach(p=>{
        p.classList.remove("active");
    })
    document.getElementById(page+"Page").classList.add("active");

    let navs = document.querySelectorAll(".nav-item");
    navs[0].classList.remove("active");
    navs[1].classList.remove("active");
    if(page === "home") navs[0].classList.add("active");
    if(page === "cate") navs[1].classList.add("active");
}

// 核心：每个分类 单独对应专属精准图片
function getImg(){
    let r = Math.floor(Math.random() * 9999);
    switch(currentType){
        case "dongman":
            return `https://picsum.photos/1080/1920?anime&r=${r}`;
        case "fengjing":
            return `https://picsum.photos/1080/1920?nature&r=${r}`;
        case "qiche":
            return `https://picsum.photos/1080/1920?car&r=${r}`;
        case "renxiang":
            return `https://picsum.photos/1080/1920?portrait&r=${r}`;
        case "meishi":
            return `https://picsum.photos/1080/1920?food&r=${r}`;
        case "yingshi":
            return `https://picsum.photos/1080/1920?movie&r=${r}`;
        case "gufeng":
            return `https://picsum.photos/1080/1920?china&r=${r}`;
        case "youxi":
            return `https://picsum.photos/1080/1920?game&r=${r}`;
        default:
            return `https://picsum.photos/1080/1920?random&r=${r}`;
    }
}

// 加载壁纸
function loadMore(){
    if(lock) return;
    lock = true;
    loading.style.display = "block";

    let html = wallList.innerHTML;
    for(let i=0;i<18;i++){
        let url = getImg();
        if(oldImgArr.includes(url)) continue;
        oldImgArr.push(url);
        html += `
        <div class="wall-item" onclick="openPre('${url}')">
            <img src="${url}">
        </div>
        `
    }

    wallList.innerHTML = html;
    loading.style.display = "none";
    lock = false;
}

// 预览关闭保存
function openPre(url){
    previewImg.src = url;
    previewBox.style.display = "flex";
}
function closePre(){
    previewBox.style.display = "none";
}
function saveImg(){
    let a = document.createElement("a");
    a.href = previewImg.src;
    a.download = "极简壁纸_"+Date.now()+".jpg";
    a.click();
}

// 无限滚动加载
window.onscroll = function(){
    if(lock) return;
    let sT = document.documentElement.scrollTop;
    let sH = document.documentElement.scrollHeight;
    let cH = document.documentElement.clientHeight;
    if(sT + cH + 200 >= sH){
        loadMore();
    }
}
</script>

</body>
</html>
