<script>
let currentPage = "home";
let currentCate = "随机";
let oldImgArr = [];
let lock = false;

const wallList = document.getElementById("wallList");
const previewBox = document.getElementById("previewBox");
const previewImg = document.getElementById("previewImg");
const topTitle = document.getElementById("topTitle");
const loading = document.getElementById("loading");

function showPage(page){
    currentPage = page;
    document.querySelectorAll(".page").forEach(p =>
        p.classList.toggle("active", p.id === page + "Page")
    );
    document.querySelectorAll(".nav-item")[0]
        .classList.toggle("active", page === "home");
    document.querySelectorAll(".nav-item")[1]
        .classList.toggle("active", page === "cate");
}

/* ✅ 分类 → Unsplash Source 关键词 */
function getQuery(){
    switch(currentCate){
        case "风景": return "nature";
        case "汽车": return "car";
        case "二次元": return "anime";
        case "人像": return "portrait";
        case "美食": return "food";
        case "影视": return "cinema";
        case "古风": return "chinese+traditional";
        case "游戏": return "gaming";
        default: return "wallpaper";
    }
}

/* ✅ 稳定、无鉴权、不黑屏 */
function getImgUrl(){
    const q = getQuery();
    const t = Date.now() + Math.random();
    return `https://source.unsplash.com/random/1080x1920/?${q}&t=${t}`;
}

function loadMore(){
    if(lock) return;
    lock = true;
    loading.style.display = "block";

    let html = wallList.innerHTML;
    for(let i=0;i<20;i++){
        const url = getImgUrl();
        if(oldImgArr.includes(url)) continue;
        oldImgArr.push(url);
        html += `
        <div class="wall-item" onclick="openPre('${url}')">
            <img src="${url}" loading="lazy">
        </div>`;
    }
    wallList.innerHTML = html;
    loading.style.display = "none";
    lock = false;
}

function openPre(url){
    previewImg.src = url;
    previewBox.style.display = "flex";
}
function closePre(){
    previewBox.style.display = "none";
}
function saveImg(){
    const a = document.createElement("a");
    a.href = previewImg.src;
    a.download = "极简壁纸.jpg";
    a.click();
}

document.querySelectorAll(".class-item").forEach(btn=>{
    btn.onclick = ()=>{
        currentCate = btn.dataset.cate;
        topTitle.innerText = currentCate + "壁纸";
        oldImgArr = [];
        wallList.innerHTML = "";
        showPage("home");
        loadMore();
    };
});

document.getElementById("searchInput").addEventListener("keyup", e=>{
    const k = e.target.value.trim();
    if(!k) return;
    currentCate = k;
    topTitle.innerText = k + "壁纸";
    oldImgArr = [];
    wallList.innerHTML = "";
    showPage("home");
    loadMore();
});

document.addEventListener("DOMContentLoaded", loadMore);

window.addEventListener("scroll",()=>{
    if(lock) return;
    const st = document.documentElement.scrollTop || document.body.scrollTop;
    const sh = document.documentElement.scrollHeight;
    const ch = document.documentElement.clientHeight;
    if(st + ch >= sh - 400){
        lock = true;
        loadMore();
    }
});

if("serviceWorker" in navigator){
    window.addEventListener("load",()=>{
        navigator.serviceWorker.register("service-worker.js");
    });
}
</script>
